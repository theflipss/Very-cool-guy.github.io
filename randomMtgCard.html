<!DOCTYPE html>
<html lang="en">
<head>

    <title>Random MTG Card</title>

    <link rel="stylesheet" href="styles/MtgCard.css">
</head>
<body>


    <div class="container">

        <div class="card" id="card">

<script src="scripts/randomCard.js"></script>
